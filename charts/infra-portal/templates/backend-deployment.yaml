apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "infra-portal.fullname" . }}-backend
  labels:
    {{- include "infra-portal.backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "infra-portal.backend.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "infra-portal.backend.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/backend-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ .Values.backend.serviceAccountName | default "default" }}
      terminationGracePeriodSeconds: {{ .Values.backend.terminationGracePeriodSeconds | default 60 }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "infra-portal.fullname" . }}-backend
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secretName | default (printf "%s-backend-secrets" (include "infra-portal.fullname" .)) }}
                  key: github-token
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secretName | default (printf "%s-backend-secrets" (include "infra-portal.fullname" .)) }}
                  key: api-key
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: {{ .Values.backend.livenessProbe.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.backend.livenessProbe.periodSeconds | default 10 }}
            failureThreshold: {{ .Values.backend.livenessProbe.failureThreshold | default 3 }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: {{ .Values.backend.readinessProbe.initialDelaySeconds | default 3 }}
            periodSeconds: {{ .Values.backend.readinessProbe.periodSeconds | default 5 }}
            failureThreshold: {{ .Values.backend.readinessProbe.failureThreshold | default 3 }}
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 12
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.backend.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml .Values.backend.topologySpreadConstraints | nindent 8 }}
      {{- end }}
