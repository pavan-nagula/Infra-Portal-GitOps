{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "infra-portal.fullname" . }}
  labels:
    {{- include "infra-portal.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Backend API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "infra-portal.fullname" . }}-backend
                port:
                  number: 8000
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: {{ include "infra-portal.fullname" . }}-backend
                port:
                  number: 8000
          # UI (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "infra-portal.fullname" . }}-ui
                port:
                  number: 80
{{- end }}
