# ============================
# Default values for infra-portal
# ============================

namespace: infra-portal

# -- Backend (Python FastAPI) --
backend:
  replicaCount: 2
  securityEnabled: "true"
  corsAllowedOrigins: "https://infra-portal.cubic.com"
  terraformRepoPath: /data/terraform-repo
  terminationGracePeriodSeconds: 30

  image:
    repository: cubic-aws.dkr.ecr.us-west-2.amazonaws.com/infra-portal-backend
    tag: ""  # Overridden by CI/CD
    pullPolicy: IfNotPresent

  serviceAccountName: infra-portal-backend

  # Secrets — override via sealed-secrets, external-secrets, or ArgoCD secret plugin
  secrets:
    githubToken: ""
    apiKey: ""
  secretName: ""  # Set to use an existing secret instead of the chart-managed one

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  livenessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

  readinessProbe:
    initialDelaySeconds: 3
    periodSeconds: 5
    failureThreshold: 3

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilization: 70
    targetMemoryUtilization: 80

  nodeSelector: {}
  tolerations: []
  topologySpreadConstraints: []

# -- UI (Nginx + React SPA) --
ui:
  replicaCount: 2

  image:
    repository: cubic-aws.dkr.ecr.us-west-2.amazonaws.com/infra-portal-ui
    tag: ""  # Overridden by CI/CD
    pullPolicy: IfNotPresent

  serviceAccountName: infra-portal-ui

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  nodeSelector: {}
  tolerations: []

# -- Ingress --
ingress:
  enabled: true
  className: alb
  host: infra-portal.cubic.com
  annotations:
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: ""  # Set your ACM cert ARN
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/success-codes: "200"
  tls: []
